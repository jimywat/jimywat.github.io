<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">

  <!-- Style -->
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
  </header>

  <main>
    <!-- Search -->
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="搜索..." />
      <div class="search-buttons">
        <button class="baidu"><span style="color:#e21406">百</span><span style="color:#2319dc">度</span></button>
        <button class="bing"><span style="color:#02b7e9">B</span><span style="color:#235faf">i</span><span style="color:#02b7e9">n</span><span style="color:#00c7cc">g</span></button>
        <button class="google"><span style="color:#4285f4">G</span><span style="color:#ea4335">o</span><span style="color:#fbbc05">o</span><span style="color:#4285f4">g</span><span style="color:#34a853">l</span><span style="color:#ea4335">e</span></button>
      </div>
    </div>

    <!-- Nav -->
    <div class="nav-container-wrapper">
      <div class="nav-container">
        {% for link in site.data.links %}
        <a class="nav-item" href="{{ link.url }}" target="_blank" rel="noopener noreferrer">
          <img src="{{ link.icon }}" alt="{{ link.name }}">
          <span>{{ link.name }}</span>
        </a>
        {% endfor %}
      </div>
    </div>

    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
  </footer>

  <script>
    const input = document.getElementById('search-input');
    const baiduBtn = document.querySelector('.baidu');
    const bingBtn = document.querySelector('.bing');
    const googleBtn = document.querySelector('.google');

    function searchEngine(urlBase) {
      const query = input.value.trim();
      if(query) window.open(urlBase + encodeURIComponent(query), '_blank', 'noopener,noreferrer');
    }

    baiduBtn.addEventListener('click', () => searchEngine('https://www.baidu.com/s?wd='));
    bingBtn.addEventListener('click', () => searchEngine('https://www.bing.com/search?q='));
    googleBtn.addEventListener('click', () => searchEngine('https://www.google.com/search?q='));
  </script>
</body>
</html>
