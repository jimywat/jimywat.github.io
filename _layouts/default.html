<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.author }}</title>

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">

  <!-- Style -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
  </header>

  <main>
    <!-- Search -->
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="搜索..." />
      <div class="search-buttons">
        <button class="baidu"><span>百</span><span>度</span></button>
        <button class="bing"><span>B</span><span>i</span><span>n</span><span>g</span></button>
        <button class="google"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></button>
      </div>
    </div>

    <!-- Nav -->
    <div class="nav-container-wrapper">
      <div class="nav-container">
        {% for link in site.data.links %}
        <a class="nav-item" href="{{ link.url }}" target="_blank" rel="noopener noreferrer">
          <img src="{{ link.icon }}" alt="{{ link.name }}">
          <span>{{ link.name }}</span>
        </a>
        {% endfor %}
      </div>
    </div>

    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: "%Y" }} 
      <a href="{{ site.social.github }}" target="_blank" rel="noopener noreferrer">
        {{ site.author }}
      </a>
    </p>
  </footer>

  <script>
    const input = document.getElementById('search-input');
    const baiduBtn = document.querySelector('.baidu');
    const bingBtn = document.querySelector('.bing');
    const googleBtn = document.querySelector('.google');

    function searchEngine(urlBase) {
      const query = input.value.trim();
      if(query) window.open(urlBase + encodeURIComponent(query), '_blank', 'noopener,noreferrer');
    }

    baiduBtn.addEventListener('click', () => searchEngine('https://www.baidu.com/s?wd='));
    bingBtn.addEventListener('click', () => searchEngine('https://www.bing.com/search?q='));
    googleBtn.addEventListener('click', () => searchEngine('https://www.google.com/search?q='));
  </script>
</body>
</html>
